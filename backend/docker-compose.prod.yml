services:
  api:
    build: .
    container_name: molib_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: molib_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - molib_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ai:
    build: ../Ai
    container_name: molib_ai
    ports:
      - "8001:8000"
    env_file:
      - ../Ai/.env
    restart: unless-stopped

volumes:
  molib_pgdata:
