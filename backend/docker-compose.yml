services:
  api:
    build: .
    container_name: molib_api
    # 개발 환경에서만 --reload 사용. 프로덕션은 Dockerfile CMD 사용 (--reload 없음)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: molib_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # 로컬 개발용: 127.0.0.1에만 바인딩 (외부 인터넷 차단)
      # 프로덕션 EC2 배포 시 이 ports 블록 전체 제거할 것
      - "127.0.0.1:5432:5432"
    volumes:
      - molib_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  molib_pgdata: